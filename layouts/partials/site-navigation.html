<nav class="site-nav" role="navigation">
  <div class="nav-container">
    {{/* Hamburger toggle (mobile only) */}}
    <button class="nav-toggle" aria-label="Toggle menu" onclick="this.classList.toggle('open');document.getElementById('nav-menu').classList.toggle('open');">
      <span></span><span></span><span></span>
    </button>

    {{/* Main Menu */}}
    {{ if .Site.Menus.main }}
      <ul class="main-menu" id="nav-menu">
        {{ range .Site.Menus.main }}
        <li class="menu-item">
          <a class="menu-link no-underline"
             href="{{ .URL }}"
             {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    {{ end }}
  </div>
</nav>
